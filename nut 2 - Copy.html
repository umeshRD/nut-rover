<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NUT Rover - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; }
    body {
      background: #0d1117;
      color: #00ffc3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 1rem;
    }
    .hero {
      background: url('bbb.png') center/cover no-repeat;
      width: 100%;
      max-width: 1000px;
      height: 480px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px rgba(0, 255, 195, 0.2);
    }
    .btn {
      margin-top: 2rem;
      background: #238636;
      color: white;
      padding: 0.75rem 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>

  <div class="hero"></div>
  <a href="control.html" class="btn">Go to Rover Control</a>

</body>
</html>
